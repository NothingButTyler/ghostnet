name: Bug Report
description: File a structured report to help us improve GhostNet.
title: "[Bug]: "
labels: ["bug", "new bug"]
body:
  - type: markdown
    attributes:
      value: |

        Before opening a new issue, make sure it isn't covered by an existing issue.
        Please search for [issues with the `new bug` label](https://github.com/nothingbuttyler/ghostnet/issues?q=is%3Aissue+label%3A%22new+bug%22)
        (including closed issues) before you continue. If you find one for the brand
        you're requesting then leave a comment on it or add a reaction.

        > [!TIP]
        > Before opening a new issue, make sure it isn't covered by an existing issue.
        >  Please search for [issues with the `new bug` label](https://github.com/nothingbuttyler/ghostnet/issues?q=is%3Aissue+label%3A%22new+bug%22)

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Tell us how to see the bug ourselves.
      value: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: GhostNet Version
      description: Which version of the bot are you running? (e.g., v1.2.0)
      placeholder: v...
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Where are you running the bot?
      options:
        - Windows
        - Linux (Ubuntu/Debian)
        - Docker
        - Pterodactyl Panel
        - Render
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant console logs here.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I have checked the console for errors.
          required: true
        - label: I am running the latest version of GhostNet.
          required: true
