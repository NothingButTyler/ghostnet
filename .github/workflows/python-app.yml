name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # We need this for the Dry Run test below
        pip install pytest-timeout 

    - name: Lint with flake8
      run: |
        pip install flake8
        # Catch syntax errors and undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        
    - name: Bot Dry Run (Check for Command Errors)
      env:
        # We provide a fake token so the 'if not TOKEN' check passes
        DISCORD_TOKEN: "MTIzNDU2Nzg5MDEyMzQ1Njc4OTAuR2hv-c3ROZXQuVGVzdE1vY2tUb2tlbg=="
      run: |
        # Run for 5 seconds to check for crashes, then kill it.
        timeout 5s python main.py || code=$?; if [ $code -ne 124 ] && [ $code -ne 0 ]; then exit 1; fi
