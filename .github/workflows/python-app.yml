name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # We need this for the Dry Run test below
        pip install pytest-timeout 

    - name: Lint with flake8
      run: |
        pip install flake8
        # Catch syntax errors and undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        
    - name: Bot Dry Run (Check for Command Errors)
      env:
        DISCORD_TOKEN: "fakedata"
      run: |
        # Run the bot. We catch the output and look for "LoginFailure".
        # If we find "LoginFailure", it means the code itself is valid!
        timeout 10s python main.py > bot_output.log 2>&1 || true
        
        if grep -q "LoginFailure" bot_output.log; then
          echo "✅ Code is valid (Failed at login as expected)"
          exit 0
        elif grep -q "Traceback" bot_output.log; then
          echo "❌ Code has a real error:"
          cat bot_output.log
          exit 1
        else
          echo "✅ Test completed without critical errors"
        fi
